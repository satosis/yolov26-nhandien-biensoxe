<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bot Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .console-font { font-family: 'JetBrains Mono', monospace; }
        .glass { background: rgba(17, 24, 39, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .card-shadow { box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37); }
    </style>
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen">
    <!-- Login Overlay -->
    <div id="login-screen" class="fixed inset-0 z-50 flex items-center justify-center bg-gray-950 transition-opacity duration-500">
        <div class="glass p-8 rounded-2xl w-full max-w-md card-shadow border border-gray-800">
            <h1 class="text-3xl font-bold mb-6 text-center text-blue-500">Bot Manager</h1>
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-400 mb-1">Username</label>
                    <input type="text" id="username" class="w-full bg-gray-900 border border-gray-800 rounded-lg py-2.5 px-4 focus:ring-2 focus:ring-blue-500 outline-none">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-400 mb-1">Password</label>
                    <input type="password" id="password" class="w-full bg-gray-900 border border-gray-800 rounded-lg py-2.5 px-4 focus:ring-2 focus:ring-blue-500 outline-none">
                </div>
                <button onclick="handleLogin()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 rounded-lg transition-all duration-200 mt-2">Login</button>
            </div>
        </div>
    </div>

    <!-- Main Dashboard -->
    <div id="main-dashboard" class="hidden">
        <nav class="glass border-b border-gray-800 px-6 py-4 flex items-center justify-between sticky top-0 z-40">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center">
                    <i data-lucide="bot"></i>
                </div>
                <div>
                    <h2 class="font-bold text-lg">Telegram Command Center</h2>
                    <p class="text-xs text-gray-500" id="uptime">System Online</p>
                </div>
            </div>
            <div class="flex items-center gap-4">
                <span id="bot-status-pill" class="px-3 py-1 rounded-full text-xs font-bold uppercase tracking-wider bg-gray-800 text-gray-400">
                    Offline
                </span>
                <button onclick="logout()" class="text-gray-400 hover:text-white transition-colors">
                    <i data-lucide="log-out"></i>
                </button>
            </div>
        </nav>

        <main class="p-6 max-w-7xl mx-auto space-y-6">
            <!-- Stats Grid -->
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                <!-- Status Card -->
                <div class="glass p-5 rounded-2xl card-shadow group">
                    <div class="flex items-center justify-between mb-4">
                        <div class="p-2 bg-blue-500/10 rounded-lg text-blue-500"><i data-lucide="activity"></i></div>
                        <span id="bot-mode" class="text-xs bg-gray-800 px-2 py-1 rounded text-gray-400">Polling</span>
                    </div>
                    <h3 class="text-gray-400 text-sm font-medium">Bot Status</h3>
                    <p id="bot-status-text" class="text-2xl font-bold mt-1">Disconnected</p>
                </div>

                <!-- Health Card -->
                <div class="glass p-5 rounded-2xl card-shadow">
                    <div class="flex items-center justify-between mb-4">
                        <div class="p-2 bg-emerald-500/10 rounded-lg text-emerald-500"><i data-lucide="cpu"></i></div>
                        <span id="cpu-temp" class="text-xs font-bold text-emerald-400">0.0°C</span>
                    </div>
                    <h3 class="text-gray-400 text-sm font-medium">System Health</h3>
                    <div class="mt-3 space-y-2">
                        <div class="flex justify-between text-xs mb-1"><span>CPU</span><span id="cpu-val">0%</span></div>
                        <div class="w-full bg-gray-800 h-1.5 rounded-full overflow-hidden">
                            <div id="cpu-bar" class="bg-emerald-500 h-full transition-all duration-500" style="width: 0%"></div>
                        </div>
                        <div class="flex justify-between text-xs mb-1"><span>RAM</span><span id="ram-val">0%</span></div>
                        <div class="w-full bg-gray-800 h-1.5 rounded-full overflow-hidden">
                            <div id="ram-bar" class="bg-blue-500 h-full transition-all duration-500" style="width: 0%"></div>
                        </div>
                    </div>
                </div>

                <!-- Bot Stats Card -->
                <div class="glass p-5 rounded-2xl card-shadow">
                    <div class="flex items-center justify-between mb-4">
                        <div class="p-2 bg-purple-500/10 rounded-lg text-purple-500"><i data-lucide="bar-chart-3"></i></div>
                        <span id="active-users" class="text-xs font-bold text-purple-400">0 Users</span>
                    </div>
                    <h3 class="text-gray-400 text-sm font-medium">Bot Statistics</h3>
                    <div class="flex justify-between mt-3">
                        <div><p class="text-xs text-gray-500">Received</p><p id="msg-rcv" class="font-bold">0</p></div>
                        <div class="text-right"><p class="text-xs text-gray-500">Sent</p><p id="msg-sent" class="font-bold">0</p></div>
                    </div>
                </div>

                <!-- Rate Card -->
                <div class="glass p-5 rounded-2xl card-shadow">
                    <div class="flex items-center justify-between mb-4">
                        <div class="p-2 bg-amber-500/10 rounded-lg text-amber-500"><i data-lucide="shield-check"></i></div>
                        <span id="error-count" class="text-xs font-bold text-red-400">0 Errors</span>
                    </div>
                    <h3 class="text-gray-400 text-sm font-medium">Health Rate</h3>
                    <p class="text-2xl font-bold mt-1">100% <span class="text-xs text-emerald-500">Stable</span></p>
                </div>
            </div>

            <!-- Console and Controls Section -->
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                <!-- Terminal -->
                <div class="lg:col-span-2 glass rounded-2xl flex flex-col h-[500px] overflow-hidden">
                    <div class="px-4 py-3 border-b border-gray-800 flex justify-between items-center bg-gray-900/50">
                        <div class="flex items-center gap-2">
                            <div class="flex gap-1.5">
                                <div class="w-3 h-3 rounded-full bg-red-500/50"></div>
                                <div class="w-3 h-3 rounded-full bg-amber-500/50"></div>
                                <div class="w-3 h-3 rounded-full bg-emerald-500/50"></div>
                            </div>
                            <span class="text-xs font-medium text-gray-500 ml-2">Live Console</span>
                        </div>
                        <button onclick="clearLogs()" class="text-xs text-gray-400 hover:text-white transition-colors">Clear</button>
                    </div>
                    <div id="console" class="flex-1 p-4 overflow-y-auto console-font text-sm text-green-400/80 bg-black/40 space-y-1">
                        <div>> Initializing terminal...</div>
                    </div>
                </div>

                <!-- Actions & Config -->
                <div class="space-y-6">
                    <!-- Actions -->
                    <div class="glass p-6 rounded-2xl space-y-3">
                        <h3 class="font-semibold mb-4 flex items-center gap-2"><i data-lucide="settings-2" class="w-4 h-4"></i> Control</h3>
                        <button id="btn-start" onclick="botAction('start')" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-medium py-3 rounded-xl transition-all flex items-center justify-center gap-2">
                            <i data-lucide="play" class="w-4 h-4"></i> Start Bot
                        </button>
                        <button id="btn-stop" onclick="botAction('stop')" class="w-full bg-red-600 hover:bg-red-700 text-white font-medium py-3 rounded-xl transition-all flex items-center justify-center gap-2">
                            <i data-lucide="square" class="w-4 h-4"></i> Stop Bot
                        </button>
                        <button id="btn-restart" onclick="botAction('restart')" class="w-full bg-gray-800 hover:bg-gray-700 text-white font-medium py-3 rounded-xl transition-all flex items-center justify-center gap-2">
                            <i data-lucide="refresh-cw" class="w-4 h-4"></i> Restart
                        </button>
                    </div>

                    <!-- Bot Config -->
                    <div class="glass p-6 rounded-2xl space-y-4">
                        <h3 class="font-semibold mb-2 flex items-center gap-2"><i data-lucide="clipboard-list" class="w-4 h-4"></i> Bot Config</h3>
                        <div>
                            <label class="text-xs text-gray-500 block mb-1">Bot Token</label>
                            <input id="cfg-token" type="password" class="w-full bg-gray-900/50 border border-gray-800 rounded-lg px-3 py-2 text-sm outline-none focus:border-blue-500 transition-colors" value="••••••••••••••••">
                        </div>
                        <button id="btn-test" onclick="testBot()" class="w-full bg-blue-600/10 text-blue-500 hover:bg-blue-600/20 font-medium py-2 rounded-lg transition-all border border-blue-500/20 text-sm">
                            Heartbeat Test
                        </button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        lucide.createIcons();
        let ws_telemetry, ws_logs;
        let currentUser = null;

        async function handleLogin() {
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;
            
            const formData = new FormData();
            formData.append('username', u);
            formData.append('password', p);

            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    body: formData
                });

                if (response.ok) {
                    const data = await response.json();
                    localStorage.setItem('token', data.access_token);
                    document.getElementById('login-screen').classList.add('opacity-0');
                    setTimeout(async () => {
                        document.getElementById('login-screen').classList.add('hidden');
                        document.getElementById('main-dashboard').classList.remove('hidden');
                        await fetchUserInfo();
                        initWS();
                        checkStatus();
                    }, 500);
                } else {
                    const err = await response.json();
                    alert(err.detail || 'Login failed');
                }
            } catch (error) {
                alert('Connection error');
            }
        }

        async function fetchUserInfo() {
            const data = await fetchWithAuth('/api/me');
            if (data) {
                currentUser = data;
                applyRolePermissions();
            }
        }

        function applyRolePermissions() {
            const roles = currentUser.scopes || [];
            const isAdmin = roles.includes('admin');
            const isManager = roles.includes('manager');

            // Admin only actions
            if (!isAdmin) {
                document.getElementById('btn-stop').classList.add('hidden');
                document.getElementById('btn-restart').classList.add('hidden'); 
                // Note: I'll update the button IDs in HTML if needed
            }

            // Admin/Manager actions
            if (!isAdmin && !isManager) {
                document.getElementById('btn-start').classList.add('hidden');
                document.getElementById('btn-test').classList.add('hidden');
            }
        }

        async function fetchWithAuth(url, options = {}) {
            const token = localStorage.getItem('token');
            const defaultOptions = {
                headers: {
                    'Authorization': `Bearer ${token}`,
                    'Content-Type': 'application/json'
                }
            };
            const mergedOptions = { ...defaultOptions, ...options };
            if (options.body) mergedOptions.body = JSON.stringify(options.body);

            try {
                const response = await fetch(url, mergedOptions);
                if (response.status === 401) {
                    logout();
                    return null;
                }
                return await response.json();
            } catch (e) {
                console.error('Fetch error:', e);
                return null;
            }
        }

        function initWS() {
            const host = window.location.host;
            const token = localStorage.getItem('token');
            
            // Passing token via protocol for simple WS auth if needed, 
            // but we'll stick to basic for now as telemetry is less sensitive.
            ws_telemetry = new WebSocket(`ws://${host}/ws/telemetry`);
            ws_telemetry.onmessage = (e) => {
                const data = JSON.parse(e.data);
                updateTelemetry(data);
            };

            ws_logs = new WebSocket(`ws://${host}/ws/logs`);
            ws_logs.onmessage = (e) => {
                const data = JSON.parse(e.data);
                if(data.logs) appendLogs(data.logs);
            };
        }

        function updateTelemetry(data) {
            document.getElementById('cpu-val').innerText = `${data.cpu.toFixed(1)}%`;
            document.getElementById('cpu-bar').style.width = `${data.cpu}%`;
            document.getElementById('ram-val').innerText = `${data.ram.toFixed(1)}%`;
            document.getElementById('ram-bar').style.width = `${data.ram}%`;
            document.getElementById('cpu-temp').innerText = `${data.temp.toFixed(1)}°C`;
            
            if(data.bot_stats) {
                document.getElementById('msg-rcv').innerText = data.bot_stats.messages_received;
                document.getElementById('msg-sent').innerText = data.bot_stats.messages_sent;
                document.getElementById('active-users').innerText = `${data.bot_stats.active_users.length} Users`;
                document.getElementById('error-count').innerText = `${data.bot_stats.errors} Errors`;
            }
        }

        function appendLogs(logs) {
            const consoleDiv = document.getElementById('console');
            logs.forEach(line => {
                const div = document.createElement('div');
                div.innerText = line;
                consoleDiv.appendChild(div);
            });
            consoleDiv.scrollTop = consoleDiv.scrollHeight;
        }

        async function checkStatus() {
            const data = await fetchWithAuth('/api/bot/status');
            if (!data) return;

            const pill = document.getElementById('bot-status-pill');
            const text = document.getElementById('bot-status-text');
            
            if(data.status === 'online') {
                pill.className = "px-3 py-1 rounded-full text-xs font-bold uppercase tracking-wider bg-emerald-500/10 text-emerald-500";
                pill.innerText = 'Online';
                text.innerText = 'Running';
                if (document.getElementById('btn-start')) {
                    document.getElementById('btn-start').disabled = true;
                    document.getElementById('btn-start').classList.add('opacity-50');
                }
            } else {
                pill.className = "px-3 py-1 rounded-full text-xs font-bold uppercase tracking-wider bg-red-500/10 text-red-500";
                pill.innerText = 'Offline';
                text.innerText = 'Disconnected';
                if (document.getElementById('btn-start')) {
                    document.getElementById('btn-start').disabled = false;
                    document.getElementById('btn-start').classList.remove('opacity-50');
                }
            }
        }

        async function botAction(action) {
            const data = await fetchWithAuth(`/api/bot/${action}`, {method: 'POST'});
            if (data) {
                alert(data.message);
                checkStatus();
            }
        }

        async function testBot() {
            const data = await fetchWithAuth('/api/bot/heartbeat', {method: 'POST'});
            if (data) alert(data.message);
        }

        function clearLogs() {
            document.getElementById('console').innerHTML = '<div>> Logs cleared.</div>';
        }

        function logout() {
            localStorage.removeItem('token');
            window.location.reload();
        }
    </script>
</body>
</html>
