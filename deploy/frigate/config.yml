# Frigate configuration mẫu cho detect PERSON/CAR/MOTORCYCLE + annotated snapshots.
# Khuyến nghị chạy Frigate bằng docker compose và nạp biến môi trường từ file .env.

go2rtc:
  streams:
    # Substream cho detect (nhẹ hơn).
    shed_detect:
      - "{FRIGATE_RTSP_SUBSTREAM}"
    # Mainstream cho record/chất lượng cao.
    shed_record:
      - "{FRIGATE_RTSP_MAINSTREAM}"

mqtt:
  host: "{MQTT_HOST}"
  port: 1883
  topic_prefix: frigate
  user: "{MQTT_USER}"
  password: "{MQTT_PASSWORD}"

snapshots:
  enabled: true
  bounding_box: true
  timestamp: true

record:
  enabled: true

objects:
  track:
    - person
    - car
    - motorcycle

cameras:
  shed_gate:
    ffmpeg:
      inputs:
        - path: rtsp://127.0.0.1:8554/shed_detect
          roles:
            - detect
        - path: rtsp://127.0.0.1:8554/shed_record
          roles:
            - record
    detect:
      width: 1280
      height: 720
      fps: 8
    snapshots:
      enabled: true
      bounding_box: true
      timestamp: true
